<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8d021f">
<link rel="icon" href="logo.png">
<title>Eventi · News Castelfranco</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
<style>
  :root{
    --ink:#1b1815;
    --ink-soft:#5a534b;
    --stone:#ece7dc;
    --stone-2:#e2dccf;
    --paper:#f6f2ea;
    --brick:#8d021f;      /* colore News Castelfranco (da CastelSafe) */
    --brick-ink:#6b0117;
    --brick-light:#fce8ec;
    --moat:#3f5a4c;       /* fossato / verde */
    --line:#d3cbba;
    --free:#2f6b4f;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .wrap{max-width:860px;margin:0 auto;padding:0 20px 80px}

  /* boot loader */
  #boot-loader{position:fixed;inset:0;z-index:9999;background:var(--brick);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;padding:24px;text-align:center;transition:opacity .35s ease}
  #boot-loader.hidden{opacity:0;pointer-events:none}
  #boot-loader img{width:76px;height:76px;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  #boot-loader-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.35);
    border-top-color:#fff;border-radius:50%;animation:boot-spin .8s linear infinite}
  #boot-loader-text{color:#fff;font-size:14px;font-weight:600}
  @keyframes boot-spin{to{transform:rotate(360deg)}}

  /* header */
  header.site{
    border-bottom:2px solid var(--ink);
    padding:26px 0 18px;
    margin-bottom:8px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;
  }
  .propose-btn{
    border:1.5px solid var(--brick);background:var(--brick);color:#fff;
    font:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:2px;
    text-decoration:none;white-space:nowrap;
  }
  .propose-btn:hover{filter:brightness(.95)}
  .brand{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand-logo{width:44px;height:44px;border-radius:9px;box-shadow:0 2px 8px rgba(0,0,0,.25);flex-shrink:0}
  .brand h1{
    font-family:ui-serif,Georgia,"Times New Roman",serif;
    font-weight:600;
    font-size:clamp(22px,5vw,30px);
    letter-spacing:-.02em;
    margin:0;
    line-height:1.15;
  }
  .brand .place{
    font-family:ui-serif,Georgia,serif;
    font-style:italic;
    color:var(--brick);
    font-size:clamp(13px,2.6vw,16px);
  }

  /* meteo */
  .weather-bar{display:none;align-items:center;gap:14px;margin-top:12px;padding:12px 16px;
    background:var(--stone);border-radius:4px}
  .weather-bar.show{display:flex}
  .weather-icon-mini{width:52px;height:52px;flex-shrink:0}
  .weather-icon-mini svg{width:100%;height:100%;display:block}
  .weather-main{display:flex;flex-direction:column;gap:1px}
  .weather-temp-row{display:flex;align-items:baseline;gap:8px}
  .w-temp{font-size:22px;font-weight:700;color:var(--ink);font-family:ui-serif,Georgia,serif}
  .w-desc{font-size:13px;color:var(--ink-soft);text-transform:capitalize}
  .weather-detail-row{font-size:12px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:3px 12px;margin-top:2px}

  /* icone SVG animate del meteo (adattate da CastelSafe) */
  .w-sun-core{transform-box:fill-box;transform-origin:center;animation:w-sun-pulse 3.2s cubic-bezier(.4,0,.2,1) infinite}
  .w-sun-rays{transform-box:fill-box;transform-origin:center;animation:w-sun-spin 20s linear infinite}
  @keyframes w-sun-pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.1);filter:brightness(1.12)}}
  @keyframes w-sun-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .w-moon-core{transform-box:fill-box;transform-origin:center;animation:w-moon-float 4s ease-in-out infinite}
  @keyframes w-moon-float{0%,100%{transform:translateY(0) scale(1);filter:brightness(1)}50%{transform:translateY(-2.5px) scale(1.05);filter:brightness(1.15)}}
  .w-star{animation:w-star-twinkle 2.2s ease-in-out infinite;transform-origin:center}
  @keyframes w-star-twinkle{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  .w-cloud-top{animation:w-cloud-top-sway 3.4s ease-in-out infinite;transform-origin:center}
  @keyframes w-cloud-top-sway{0%,100%{transform:translateX(-1.6px)}50%{transform:translateX(1.6px)}}
  .w-cloud-wisp{animation:w-cloud-wisp-pass 9s linear infinite}
  @keyframes w-cloud-wisp-pass{0%{transform:translate(-26px,2px);opacity:0}12%{opacity:.4}50%{transform:translate(20px,-1px);opacity:.4}88%{opacity:.4}100%{transform:translate(46px,2px);opacity:0}}
  .w-rain-drop{animation:w-rain-fall 1.05s cubic-bezier(.55,0,.85,.35) infinite;transform-origin:center}
  @keyframes w-rain-fall{0%{transform:translateY(-3px) scaleY(.7);opacity:0}18%{opacity:1}70%{opacity:.9}100%{transform:translateY(7px) scaleY(1.15);opacity:0}}
  .w-snow-flake{animation:w-snow-fall 2.6s ease-in-out infinite;transform-origin:center}
  @keyframes w-snow-fall{0%{transform:translate(0,-2px) rotate(0deg);opacity:.35}50%{transform:translate(1.5px,2px) rotate(120deg);opacity:1}100%{transform:translate(-1.5px,6px) rotate(240deg);opacity:.35}}
  .w-bolt{transform-origin:center;animation:w-bolt-strike 3.6s ease-in-out infinite}
  @keyframes w-bolt-strike{0%{clip-path:inset(0 0 100% 0);opacity:0;filter:brightness(1)}4%{opacity:1}15%{clip-path:inset(0 0 0% 0);filter:brightness(1.8)}19%{filter:brightness(1)}24%{filter:brightness(1.6)}28%{filter:brightness(1)}33%{filter:brightness(1.5)}37%{filter:brightness(1)}60%{clip-path:inset(0 0 0% 0);opacity:1;filter:brightness(1)}80%{clip-path:inset(100% 0 0 0);opacity:0}100%{clip-path:inset(0 0 100% 0);opacity:0}}
  .w-fog-line{animation:w-fog-drift 3.4s ease-in-out infinite;transform-origin:center}
  .w-fog-line:nth-child(2){animation-delay:.4s}
  .w-fog-line:nth-child(3){animation-delay:.8s}
  @keyframes w-fog-drift{0%,100%{transform:translateX(-2px);opacity:.5}50%{transform:translateX(2px);opacity:1}}
  @media(prefers-reduced-motion:reduce){
    .w-sun-core,.w-sun-rays,.w-cloud-top,.w-cloud-wisp,.w-rain-drop,.w-snow-flake,.w-bolt,.w-fog-line,
    .w-moon-core,.w-star{animation:none!important}
  }

  /* controls */
  .controls{position:sticky;top:0;z-index:5;background:var(--paper);
    padding:14px 0 12px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .search{
    width:100%;border:1.5px solid var(--line);background:#fff;
    padding:11px 14px;font-size:15px;border-radius:2px;color:var(--ink);
    font-family:inherit;
  }
  .search:focus{outline:none;border-color:var(--brick)}
  .filters{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .chip{
    border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);
    font:inherit;font-size:13px;padding:6px 12px;border-radius:100px;
    cursor:pointer;user-select:none;transition:.12s;
  }
  .chip:hover{border-color:var(--ink-soft)}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip.free[aria-pressed="true"]{background:var(--free);border-color:var(--free)}
  .chip.food[aria-pressed="true"]{background:var(--moat);border-color:var(--moat)}
  .controls-divider{height:1px;background:var(--line);margin:12px 0}
  .view-actions{display:flex;gap:8px;flex-wrap:wrap}

  /* mini mappa */
  #map-panel{max-height:0;overflow:hidden;transition:max-height .25s ease;
    border-radius:3px;margin-top:0;position:relative}
  #map-panel.open{max-height:340px;margin-top:11px}
  #map-panel .leaflet-container{height:320px;border-radius:3px;border:1px solid var(--line)}
  .map-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(20,17,14,.8);color:#fff;font-size:12px;padding:6px 12px;border-radius:100px;
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:400}
  .map-hint.show{opacity:1}
  .map-legend{display:flex;gap:8px;font-size:12px;color:var(--ink-soft);margin-top:6px}
  .map-legend-btn{font:inherit;font-size:12px;color:var(--ink-soft);background:none;
    border:1.5px solid var(--line);border-radius:100px;padding:3px 10px;cursor:pointer}
  .map-legend-btn[aria-pressed="false"]{opacity:.45}
  .map-legend .dot{display:inline-block;width:13px;height:13px;border-radius:100px;margin-right:5px;vertical-align:-1px}
  .map-legend .dot.today{background:#2f6b4f}
  .map-legend .dot.tomorrow{background:#c9a227}
  .map-popup-list{display:flex;flex-direction:column;gap:4px;min-width:160px}
  .map-popup-list button{font:inherit;font-size:13px;text-align:left;background:none;
    border:none;padding:4px 2px;cursor:pointer;color:var(--brick);border-bottom:1px solid var(--line)}
  .map-popup-list button:last-child{border-bottom:none}

  /* day rail */
  .day{display:grid;grid-template-columns:76px 1fr;gap:16px;margin-top:30px}
  .day-rail{position:relative;text-align:right;padding-top:2px}
  .day-rail::after{content:"";position:absolute;top:6px;right:-8px;bottom:0;
    width:2px;background:var(--line)}
  .day .dow{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft)}
  .day .dnum{font-family:ui-serif,Georgia,serif;font-size:30px;line-height:1;font-weight:600}
  .day .mon{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .day.today .dnum{color:var(--brick)}
  .day.today .rail-badge{display:inline-block;margin-top:6px;font-size:10px;
    letter-spacing:.1em;background:var(--brick);color:#fff;padding:2px 6px;border-radius:2px}

  /* cards: riga minima, click apre il popup con tutti i dettagli */
  .cards{display:flex;flex-direction:column;gap:10px}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:3px;
    transition:.12s;display:grid;grid-template-columns:52px 1fr;gap:12px;
    padding:10px 12px;cursor:pointer;text-align:left;width:100%;font:inherit;color:inherit;
  }
  .card:hover{border-color:var(--ink-soft);box-shadow:0 2px 0 var(--stone-2)}
  .card.highlight{border-color:var(--brick);box-shadow:0 0 0 2px var(--brick)}
  .poster-sm{width:52px;height:52px;object-fit:cover;border-radius:2px;
    background:var(--stone-2);display:block}
  .poster-sm.ph{display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);font-size:9px;text-align:center}
  .s-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
  .cat{font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 7px;border-radius:2px;background:var(--stone);color:var(--brick-ink);font-weight:600;
    flex-shrink:0}
  .s-title{font-family:ui-serif,Georgia,serif;font-size:16px;font-weight:600;
    letter-spacing:-.01em;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    width:100%}
  .s-time{font-size:13px;font-weight:600;flex-shrink:0}
  .s-venue{font-size:12px;color:var(--ink-soft);flex-shrink:0}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .b{font-size:11px;padding:2px 8px;border-radius:100px;border:1px solid var(--line)}
  .b.free{color:var(--free);border-color:var(--free)}
  .b.food{color:var(--moat);border-color:var(--moat)}

  /* popup evento */
  .modal-overlay{position:fixed;inset:0;background:rgba(27,24,21,.62);z-index:50;
    display:none;align-items:flex-start;justify-content:center;padding:36px 14px;overflow:auto}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:6px;max-width:520px;width:100%;overflow:hidden;
    box-shadow:0 16px 50px rgba(0,0,0,.35);position:relative}
  .modal-close{position:absolute;top:12px;right:12px;background:rgba(20,17,14,.55);
    color:#fff;border:none;border-radius:100px;width:34px;height:34px;font-size:18px;
    line-height:1;cursor:pointer;z-index:2}
  .modal-close:hover{background:rgba(20,17,14,.8)}
  .modal-poster{width:100%;max-height:420px;object-fit:contain;background:var(--stone-2);display:block}
  .modal-poster.ph{display:flex;align-items:center;justify-content:center;height:160px;
    color:var(--ink-soft);font-family:ui-serif,Georgia,serif;font-style:italic;font-size:15px}
  .modal-body{padding:20px 24px 26px}
  .modal-title{font-family:ui-serif,Georgia,serif;font-size:26px;font-weight:600;
    letter-spacing:-.01em;margin:8px 0 2px;line-height:1.15}
  .modal-dates{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .modal-date-row{font-size:14px;font-weight:600}
  .modal-date-row .arrow{color:var(--ink-soft);font-weight:400;margin:0 4px}
  .icon{width:1em;height:1em;vertical-align:-0.15em;display:inline-block;flex-shrink:0}
  .modal-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .modal-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--ink-soft);font-weight:600;margin-bottom:5px}
  .modal-row{font-size:14px;display:flex;align-items:center;gap:8px}
  .modal-row+.modal-row{margin-top:6px}
  .modal-row .icon{color:var(--ink-soft);margin-top:2px}
  .modal-address{font-size:13px;color:var(--ink-soft);margin-top:1px}
  .modal-price{font-weight:600}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .b{font-size:11px;padding:2px 8px;border-radius:100px;border:1px solid var(--line)}
  .b.free{color:var(--free);border-color:var(--free)}
  .b.food{color:var(--moat);border-color:var(--moat)}
  .modal-desc{font-size:14px;color:var(--ink-soft);line-height:1.5}
  .modal-contact a{color:var(--brick);text-decoration:none;border-bottom:1px solid var(--line)}
  .modal-row.modal-contact{display:block}
  .modal-row.modal-contact>div+div{margin-top:4px}
  .modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
  .modal-action{border:1.5px solid var(--line);background:#fff;padding:9px 14px;border-radius:2px;
    font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;color:var(--ink);
    display:inline-flex;align-items:center;gap:6px}
  .modal-action:hover{border-color:var(--ink-soft);background:var(--stone)}
  @media(max-width:520px){.modal-poster{height:220px}}

  /* calendario */
  .cal-modal{max-width:900px;padding:20px 22px 24px}
  .cal-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;
    gap:10px;margin-bottom:16px;padding-right:34px}
  .cal-nav{display:flex;align-items:center;gap:10px}
  .cal-nav .cal-arrow{border:1.5px solid var(--line);background:#fff;width:30px;height:30px;
    border-radius:2px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
  .cal-nav .cal-arrow:hover{border-color:var(--ink-soft)}
  .cal-title{font-family:ui-serif,Georgia,serif;font-size:19px;font-weight:600;min-width:160px;text-align:center}
  .cal-views{display:flex;gap:6px}
  .cal-view-btn,#cal-today{font:inherit;font-size:12px;border:1.5px solid var(--line);background:#fff;
    color:var(--ink-soft);padding:6px 11px;border-radius:100px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .cal-view-btn[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .cal-month{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:3px;overflow:hidden}
  .cal-dow{background:var(--stone);font-size:11px;text-transform:uppercase;color:var(--ink-soft);
    padding:6px 4px;text-align:center;font-weight:600;min-width:0}
  .cal-cell{background:#fff;min-height:88px;padding:5px;font-size:11px;display:flex;flex-direction:column;
    gap:2px;min-width:0;overflow:hidden}
  .cal-cell.other-month{background:#fbf9f5;color:var(--ink-soft)}
  .cal-cell.today{background:#fdf3f0}
  .cal-daynum{font-size:12px;font-weight:600;margin-bottom:2px}
  .cal-cell.today .cal-daynum{color:var(--brick)}
  .cal-ev{background:var(--stone);border-radius:2px;padding:2px 5px;cursor:pointer;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;border:none;
    font:inherit;font-size:10.5px;width:100%;color:var(--ink)}
  .cal-ev:hover{background:var(--stone-2)}
  .cal-more{font-size:10px;color:var(--ink-soft);background:none;border:none;font:inherit;
    text-align:left;cursor:pointer;padding:0}

  .cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .cal-week-col{border:1px solid var(--line);border-radius:3px;min-height:220px;padding:8px 6px;min-width:0}
  .cal-week-col .cal-daynum{text-align:center;padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .cal-week-col.today{background:#fdf3f0}
  .cal-week .cal-ev{margin-bottom:4px;white-space:normal;font-size:11px}

  .cal-day-list{display:flex;flex-direction:column;gap:8px}
  .cal-day-row{display:flex;gap:10px;align-items:center;border:1px solid var(--line);
    border-radius:3px;padding:8px 10px;cursor:pointer;background:#fff;text-align:left;font:inherit;width:100%}
  .cal-day-row:hover{border-color:var(--ink-soft)}
  .cal-day-time{font-weight:600;font-size:13px;flex-shrink:0;width:100px}
  .cal-day-title{font-family:ui-serif,Georgia,serif;font-size:15px}
  .cal-empty{text-align:center;color:var(--ink-soft);font-style:italic;padding:30px;font-size:14px}
  @media(max-width:640px){
    .cal-month{grid-template-columns:repeat(7,minmax(36px,1fr))}
    .cal-cell{min-height:60px;font-size:9px;padding:3px}
    .cal-week{grid-template-columns:1fr}
  }

  .empty{text-align:center;color:var(--ink-soft);padding:60px 20px;
    font-family:ui-serif,Georgia,serif;font-style:italic;font-size:18px}
  .count{font-size:13px;color:var(--ink-soft);margin:18px 0 0}
  footer{margin-top:50px;padding-top:16px;border-top:1px solid var(--line);
    font-size:12px;color:var(--ink-soft)}

  @media(max-width:520px){
    .day{grid-template-columns:56px 1fr;gap:10px}
    .day .dnum{font-size:24px}
    .day-rail::after{right:-6px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="boot-loader">
  <img src="logo.png" alt="">
  <div id="boot-loader-spinner"></div>
  <div id="boot-loader-text">Caricamento in corso…</div>
</div>
<div class="wrap">
  <header class="site">
    <div class="brand">
      <img src="logo.png" alt="" class="brand-logo">
      <div>
        <h1>News Castelfranco</h1>
        <span class="place">Eventi</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a class="propose-btn" href="./submit.html">+ Proponi un evento</a>
      <a class="propose-btn" href="./modifica.html"
        style="background:transparent;color:var(--brick)">Modifica il tuo evento</a>
      <a class="propose-btn" href="./admin.html"
        style="background:transparent;color:var(--brick)">Accesso staff</a>
    </div>
  </header>

  <div class="weather-bar" id="weather-bar"></div>

  <div class="controls">
    <input class="search" id="q" type="search" placeholder="Cerca un evento, un luogo…" aria-label="Cerca">
    <div class="filters" id="filters">
      <button class="chip cat-f" data-cat="sagra" aria-pressed="false">Sagre</button>
      <button class="chip cat-f" data-cat="concerto" aria-pressed="false">Concerti</button>
      <button class="chip cat-f" data-cat="cultura" aria-pressed="false">Cultura</button>
      <button class="chip cat-f" data-cat="sport" aria-pressed="false">Sport</button>
      <button class="chip cat-f" data-cat="mercato" aria-pressed="false">Mercati</button>
      <button class="chip free" id="f-free" aria-pressed="false">Gratis</button>
      <button class="chip food" id="f-food" aria-pressed="false">Con cucina</button>
      <button class="chip food" id="f-bar" aria-pressed="false">Con bar</button>
      <button class="chip venue-f" data-vt="indoor" aria-pressed="false">Al chiuso</button>
      <button class="chip venue-f" data-vt="outdoor" aria-pressed="false">All'aperto</button>
      <button class="chip venue-f" data-vt="both" aria-pressed="false">Entrambi</button>
    </div>

    <div class="controls-divider"></div>

    <div class="view-actions">

<script>
// Dati (events.json, weather.json, poster) NON sono committati su Pages: solo la shell

const PI_BASE = (location.hostname==="localhost"||location.hostname==="127.0.0.1")

// ---- icone SVG (niente emoji: rendering incoerente tra piattaforme) ----
const ICON_PATHS = {
  mail:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
  share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
  pin:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',

};
function icon(name){
  return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICON_PATHS[name]}</svg>`;

// ---- STEP 1: dati serviti da events.json (qui inline come fallback per l'anteprima) ----
// In produzione: sostituisci FALLBACK con  await fetch('./events.json').then(r=>r.json())
// Lo schema qui sotto è quello BLOCCATO. Nota `slots`: un evento multi-giorno = UNA riga.
// Nessun dato finto: se il Pi/Funnel non risponde, meglio dirlo chiaramente
// (vedi RUNBOOK §6.5) che mostrare eventi di esempio spacciati per reali.
const FALLBACK = { town_bbox:[45.650,11.905,45.690,11.950], events: [] };
let dataLoadFailed = false;

const CAT_LABEL = {sagra:"Sagra",concerto:"Concerto",cultura:"Cultura",sport:"Sport",mercato:"Mercato",altro:"Altro"};
const DOW = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const MON = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
const MON_FULL = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

const state = { cats:new Set(), free:false, food:false, bar:false, venueTypes:new Set(), q:"" };
let DATA = FALLBACK;

function dayKey(iso){ return iso.slice(0,10); }
// per oggetti Date (non stringhe ISO): mai .toISOString(), converte in UTC e sposta
// la data di un giorno vicino alla mezzanotte nei fusi avanti su UTC (es. l'Italia).
function localDateKey(d){
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtTime(iso){ const d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

// espande ogni evento nei suoi slot-giorno: è così che "cosa c'è oggi" e la mappa restano possibili.
// Uno slot puo' coprire piu' giorni (es. una mostra dal 27 giugno al 23 agosto, un solo slot
// con start/end lontani): resta un elemento PER OGNI giorno coperto, cosi' non sparisce dalla
// lista/calendario/mappa il giorno dopo l'inizio pur durando settimane. Cap di sicurezza a 180
// giorni per non esplodere se qualcuno inserisce per sbaglio un anno di fine sbagliato.
function expand(events){
  const out=[];
  for(const e of events){
    for(const s of e.slots){
      const cur=new Date(s.start); cur.setHours(0,0,0,0);
      const endDay=new Date(s.end); endDay.setHours(0,0,0,0);
      const startMs=new Date(s.start).getTime();
      for(let guard=0; cur<=endDay && guard<180; guard++){
        out.push({ev:e, slot:s, key:localDateKey(cur), sort:guard===0?startMs:cur.getTime()});
        cur.setDate(cur.getDate()+1);
      }
    }
  }
  return out.sort((a,b)=>a.sort-b.sort);
}

function passesFilter(e){
  if(state.cats.size && !(e.categories||[]).some(c=>state.cats.has(c))) return false;
  if(state.free && !e.is_free) return false;
  if(state.food && !(e.food||[]).includes("cucina")) return false;
  if(state.bar && !(e.food||[]).includes("bar")) return false;
  if(state.venueTypes.size){
    const matches = state.venueTypes.has(e.venue_type)
      || (e.venue_type==="both" && (state.venueTypes.has("indoor")||state.venueTypes.has("outdoor")));
    if(!matches) return false;
  }
  if(state.q){
    const hay=(e.title+" "+e.venue_name+" "+(e.description||"")).toLowerCase();
    if(!hay.includes(state.q)) return false;
  }
  return true;
}

function render(){
  const todayKey = localDateKey(new Date());
  const items = expand(DATA.events).filter(i=>passesFilter(i.ev) && i.key>=todayKey);
  const list=document.getElementById("list");
  list.innerHTML="";
  if(!items.length){
    list.innerHTML='<div class="empty">Nessun evento in programma con questi filtri.</div>';
    document.getElementById("count").textContent="";
    return;
  }
  // raggruppa per giorno
  const byDay=new Map();
  for(const i of items){ if(!byDay.has(i.key)) byDay.set(i.key,[]); byDay.get(i.key).push(i); }

  for(const [key,rows] of byDay){
    const d=new Date(key+"T00:00");
    const day=document.createElement("section");
    day.className="day"+(key===todayKey?" today":"");
    day.innerHTML=`
      <div class="day-rail">
        <div class="dow">${DOW[d.getDay()]}</div>
        <div class="dnum">${d.getDate()}</div>
        <div class="mon">${MON[d.getMonth()]}</div>
        ${key===todayKey?'<span class="rail-badge">OGGI</span>':''}
      </div>
      <div class="cards"></div>`;
    const cards=day.querySelector(".cards");
    for(const {ev,slot} of rows) cards.appendChild(cardEl(ev,slot));
    list.appendChild(day);
  }
  document.getElementById("count").textContent=`${items.length} appuntament${items.length===1?"o":"i"} in programma`;
}

function cardEl(e,slot){
  const el=document.createElement("button");
  el.className="card"; el.type="button";
  el.dataset.eventId=e.id;
  const posterSm = e.poster_thumb
    ? `<img class="poster-sm" src="${POSTER_BASE}/posters/${esc(e.poster_thumb)}" alt="">`
    : `<div class="poster-sm ph">n/d</div>`;
  const FOOD_LABEL={rinfresco:"Rinfresco",bar:"Bar",cucina:"Cucina"};
  const foodBadges = (e.food||[]).map(f=>`<span class="b food">${FOOD_LABEL[f]||f}</span>`).join("");
  const freeBadge = e.is_free ? '<span class="b free">Gratis</span>' : '';
  const venueBadge = e.venue_type ? `<span class="b">${esc({indoor:"Al chiuso",outdoor:"All'aperto",both:"Al chiuso e all'aperto"}[e.venue_type]||e.venue_type)}</span>` : '';
  const catsTxt=(e.categories||[]).map(c=>CAT_LABEL[c]||c).join(", ");
  el.innerHTML=`
    ${posterSm}
    <div class="s-top">
      <span class="cat">${esc(catsTxt)}</span>
      <span class="s-title">${esc(e.title)}</span>
      <span class="s-time">${fmtTime(slot.start)}–${fmtTime(slot.end)}</span>
      <span class="s-venue">${esc(e.venue_name)}</span>
      <div class="badges">${freeBadge}${foodBadges}${venueBadge}</div>
    </div>`;
  el.addEventListener("click",()=>openModal(e));
  return el;
}

// ---- popup con tutti i dettagli ----
function fmtDateLong(iso){
  const d=new Date(iso);
  const p=n=>String(n).padStart(2,"0");
  return `${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}, ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function icsDate(iso){
  const d=new Date(iso), p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
function gcalUrl(e,slot){
  const start=icsDate(slot.start), end=icsDate(slot.end);
  const p=new URLSearchParams({
    action:"TEMPLATE", text:e.title, dates:`${start}/${end}`,
    details:e.description||"", location:`${e.lat},${e.lon}`,   // coordinate: piu' precise del nome libero
  });
  return `https://www.google.com/calendar/render?${p.toString()}`;
}
function mapsUrl(e){
  return `https://www.google.com/maps/search/?api=1&query=${e.lat},${e.lon}`;
}

function openModal(e){
  const poster = e.poster
    ? `<img class="modal-poster" src="${POSTER_BASE}/posters/${esc(e.poster)}" alt="Locandina">`
    : `<div class="modal-poster ph">senza locandina</div>`;
  const FOOD_LABEL={rinfresco:"Rinfresco",bar:"Bar",cucina:"Cucina"};

  const freeBadge = e.is_free ? '<span class="b free">Gratis</span>' : '';
  const DISC_LABEL=d=>d.type==="studenti"?"Studenti":d.type==="over"?`Over ${d.age}`:`Under ${d.age}`;
  const discountsTxt=(e.discounts||[]).map(DISC_LABEL).join(", ");

  const catsTxt=(e.categories||[]).map(c=>CAT_LABEL[c]||c).join(", ");
  const datesHtml = e.slots.map(s=>
    `<div class="modal-date-row">${fmtDateLong(s.start)}<span class="arrow">→</span>${fmtDateLong(s.end)}</div>`
  ).join("");
  const calButtons = e.slots.map((s,i)=>
    `<a class="modal-action" target="_blank" rel="noopener" href="${gcalUrl(e,s)}">${icon("calendar")} Aggiungi al calendario${e.slots.length>1?` (giorno ${i+1})`:""}</a>`
  ).join("");
  document.getElementById("modal-content").innerHTML = `
    ${poster}
    <div class="modal-body">
      <span class="cat">${esc(catsTxt)}</span>
      <h2 class="modal-title">${esc(e.title)}</h2>
      <div class="modal-dates">${datesHtml}</div>

      <div class="modal-section">
        <div class="modal-label">Dove</div>
        <div class="modal-row" style="align-items:flex-start">
          ${icon("pin")}
          <div>
            <div class="k">${esc((e.venue_name||"").trim())}</div>
            ${(e.address||"").trim()?`<div class="modal-address">${esc(e.address.trim())}</div>`:""}
          </div>
        </div>
        ${e.venue_type?`<div class="badges" style="margin-top:8px"><span class="b">${esc({indoor:"Al chiuso",outdoor:"All'aperto",both:"Al chiuso e all'aperto"}[e.venue_type]||e.venue_type)}</span></div>`:""}
      </div>

      <div class="modal-section">
        <div class="modal-label">Prezzo</div>
        <div class="modal-row">${e.is_free?'<span class="b free">Gratis</span>':`<span class="modal-price">${esc(e.cost||"—")}</span>`}</div>
        ${discountsTxt?`<div class="modal-row" style="margin-top:6px;font-size:13px;color:var(--ink-soft)">Riduzioni: ${esc(discountsTxt)}</div>`:""}
      </div>

      ${foodBadges?`<div class="modal-section">
        <div class="modal-label">Food and beverage</div>
        <div class="modal-row"><div class="badges">${foodBadges}</div>${e.food_note?" "+esc(e.food_note):""}</div>
      </div>`:""}

      ${e.description?`<div class="modal-section">
        <div class="modal-label">Descrizione</div>
        <p class="modal-desc">${esc(e.description)}</p>
      </div>`:""}

      ${contacts?`<div class="modal-section">
        <div class="modal-label">Contatti</div>
        <div class="modal-row modal-contact">${contacts}</div>
      </div>`:""}
      <div class="modal-actions">
        <a class="modal-action" target="_blank" rel="noopener" href="${mapsUrl(e)}">${icon("pin")} Apri in Google Maps</a>
        ${calButtons}
      </div>
    </div>`;
  document.getElementById("modal-overlay").classList.add("show");
  history.replaceState(null,"","#ev-"+e.id);
}
function closeModal(){
  document.getElementById("modal-overlay").classList.remove("show");
  history.replaceState(null,"",location.pathname+location.search);
}
document.getElementById("modal-close").addEventListener("click",closeModal);
document.getElementById("modal-overlay").addEventListener("click",e=>{
  if(e.target.id==="modal-overlay") closeModal();
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// se arrivi da un link email (#ev-<id>), apri direttamente il popup di quell'evento
function focusFromHash(){
  const m = location.hash.match(/^#ev-(.+)$/);
  if(!m) return;
  const flat = expand(DATA.events);
  const found = flat.find(i=>i.ev.id===m[1]);
  if(found) openModal(found.ev);
}

function contactUrl(type,value){
  if(/^https?:\/\//i.test(value)) return value;
  const handle=value.replace(/^@/,"").trim();
  if(type==="instagram") return `https://instagram.com/${handle}`;
  if(type==="facebook") return `https://facebook.com/${handle}`;
  if(type==="tiktok") return `https://tiktok.com/@${handle}`;
  if(type==="sito") return `https://${value.replace(/^\/+/,"")}`;
  return null;   // "social"/altro non riconosciuto: nessun link costruibile, solo testo
}
function renderContact(c){
  if(!c) return "";
  if(c.type==="email") return `${icon("mail")} <a href="mailto:${c.value}">${esc(c.value)}</a>`;
  if(c.type==="telefono") return `${icon("phone")} <a href="tel:${c.value.replace(/\s/g,'')}">${esc(c.value)}</a>`;
  const url=contactUrl(c.type, c.value);
  if(url) return `${icon("share")} <a href="${esc(url)}" target="_blank" rel="noopener">${esc(c.value)}</a>`;
  return `${icon("share")} ${esc(c.value)}`;
}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

// eventi UI
document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value.trim().toLowerCase();render()});
document.querySelectorAll(".cat-f").forEach(b=>b.addEventListener("click",()=>{

["f-free","f-food","f-bar"].forEach(id=>{

    else if(id==="f-food")state.food=!on;

document.querySelectorAll(".venue-f").forEach(b=>b.addEventListener("click",()=>{

// ---- mini mappa: un pallino per luogo, verde se oggi c'e' un evento, giallo se prossimamente.
// legenda cliccabile: filtra quali marker mostrare, di default entrambi (standard = tutto visibile).
const mapLegendState={today:true,upcoming:true};
let leafletMap=null;
function buildMapMarkers(){
  if(!leafletMap) return;
  leafletMap.eachLayer(l=>{ if(l instanceof L.CircleMarker) leafletMap.removeLayer(l); });
  const todayKey=localDateKey(new Date());

  const groups=new Map(); // "lat,lon" -> {isToday, events:Set}
  for(const ev of DATA.events){
    // uno slot puo' coprire piu' giorni (mostra di settimane): "oggi" se oggi cade dentro
    // [start,end] di uno slot, non solo se lo slot INIZIA oggi.
    const isToday=ev.slots.some(s=>dayKey(s.start)<=todayKey && dayKey(s.end)>=todayKey);
    const isUpcoming=ev.slots.some(s=>dayKey(s.start)>todayKey);
    if(!isToday && !isUpcoming) continue;   // evento del tutto passato: non va in mappa
    if(isToday && !mapLegendState.today && !(isUpcoming && mapLegendState.upcoming)) continue;
    if(!isToday && isUpcoming && !mapLegendState.upcoming) continue;
    const gk=`${ev.lat.toFixed(5)},${ev.lon.toFixed(5)}`;
    if(!groups.has(gk)) groups.set(gk,{lat:ev.lat,lon:ev.lon,isToday:false,events:[]});
    const g=groups.get(gk);
    g.isToday = g.isToday || isToday;
    g.events.push(ev);
  }
  for(const g of groups.values()){
    const marker=L.circleMarker([g.lat,g.lon],{
      radius:9, color:"#fff", weight:2,
      fillColor:g.isToday?"#2f6b4f":"#c9a227", fillOpacity:0.9,
    }).addTo(leafletMap);
    marker.on("click",()=>{
      if(g.events.length===1){ openModal(g.events[0]); return; }
      const html=`<div class="map-popup-list">${g.events.map((ev,i)=>
        `<button data-i="${i}">${esc(ev.title)}</button>`).join("")}</div>`;
      marker.bindPopup(html).openPopup();
      setTimeout(()=>{
        marker.getPopup().getElement().querySelectorAll("button").forEach(b=>
          b.addEventListener("click",()=>{ marker.closePopup(); openModal(g.events[+b.dataset.i]); }));
      },0);
    });
  }
}
let mapHintTimer=null;
function showMapHint(){
  const hint=document.getElementById("map-hint");
  hint.classList.add("show");
  clearTimeout(mapHintTimer);
  mapHintTimer=setTimeout(()=>hint.classList.remove("show"),1400);
}
document.getElementById("map-toggle").innerHTML = icon("map")+' <span class="map-toggle-label">Mostra mappa</span>';
document.getElementById("map-toggle").addEventListener("click",()=>{
  const panel=document.getElementById("map-toggle");
  const open=panel.getAttribute("aria-pressed")!=="true";
  panel.setAttribute("aria-pressed",String(open));
  panel.setAttribute("aria-expanded",String(open));
  panel.querySelector(".map-toggle-label").textContent = open?"Nascondi mappa":"Mostra mappa";
  document.getElementById("map-panel").classList.toggle("open",open);
  document.getElementById("map-legend").style.display = open?"flex":"none";
  if(open){
    if(!leafletMap){
      const [minlat,minlon,maxlat,maxlon]=(DATA.town_bbox)||[45.650,11.905,45.690,11.950];
      leafletMap=L.map("map",{scrollWheelZoom:false}).fitBounds([[minlat,minlon],[maxlat,maxlon]]);
      // ctrl+rotellina per zoomare (niente scroll-jacking accidentale); pinch da telefono gia' attivo di default
      leafletMap.getContainer().addEventListener("wheel", ev=>{
        if(ev.ctrlKey || ev.metaKey){
          ev.preventDefault();
          if(ev.deltaY<0) leafletMap.zoomIn(); else leafletMap.zoomOut();
        } else {
          showMapHint();
        }
      }, {passive:false});
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{
        attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom:19,
      }).addTo(leafletMap);
      buildMapMarkers();
    }
    setTimeout(()=>leafletMap.invalidateSize(),260);
  }
});
document.querySelectorAll(".map-legend-btn").forEach(b=>b.addEventListener("click",()=>{
  const on=b.getAttribute("aria-pressed")==="true";
  b.setAttribute("aria-pressed",String(!on));
  mapLegendState[b.dataset.mv]=!on;
  buildMapMarkers();
}));

// ---- calendario: vista giorno/settimana/mese, click evento apre il solito popup ----
const calState={view:"month", date:new Date()};
const calOverlay=document.getElementById("calendar-overlay");

function eventsOnDay(key){
  return expand(DATA.events).filter(i=>i.key===key);
}
function startOfWeek(d){
  const x=new Date(d); const dow=(x.getDay()+6)%7; // lunedi'=0
  x.setDate(x.getDate()-dow); x.setHours(0,0,0,0); return x;
}
function fmtKey(d){ return localDateKey(d); }

function renderCalendar(){
  const todayKey=localDateKey(new Date());
  const grid=document.getElementById("cal-grid");
  const title=document.getElementById("cal-title");

  if(calState.view==="month"){
    const y=calState.date.getFullYear(), m=calState.date.getMonth();
    title.textContent=`${MON_FULL[m]} ${y}`;
    const first=new Date(y,m,1);
    const gridStart=startOfWeek(first);
    let html='<div class="cal-month">';
    ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
    for(let i=0;i<42;i++){
      const d=new Date(gridStart); d.setDate(d.getDate()+i);
      const key=fmtKey(d);
      const items=eventsOnDay(key);
      const otherMonth=d.getMonth()!==m;
      const shown=items.slice(0,3);
      html+=`<div class="cal-cell${otherMonth?" other-month":""}${key===todayKey?" today":""}">
        <div class="cal-daynum">${d.getDate()}</div>
        ${shown.map(i=>`<button type="button" class="cal-ev" data-id="${esc(i.ev.id)}">${esc(i.ev.title)}</button>`).join("")}
        ${items.length>3?`<button type="button" class="cal-more" data-key="${key}">+${items.length-3} altri</button>`:""}
      </div>`;
    }
    html+="</div>";
    grid.innerHTML=html;

  } else if(calState.view==="week"){
    const start=startOfWeek(calState.date);
    const end=new Date(start); end.setDate(end.getDate()+6);
    title.textContent=`${start.getDate()} ${MON[start.getMonth()]} – ${end.getDate()} ${MON[end.getMonth()]}`;
    let html='<div class="cal-week">';
    for(let i=0;i<7;i++){
      const d=new Date(start); d.setDate(d.getDate()+i);
      const key=fmtKey(d);
      const items=eventsOnDay(key).sort((a,b)=>a.sort-b.sort);
      html+=`<div class="cal-week-col${key===todayKey?" today":""}">
        <div class="cal-daynum">${DOW[d.getDay()]} ${d.getDate()}</div>
        ${items.length?items.map(i=>`<button type="button" class="cal-ev" data-id="${esc(i.ev.id)}">${fmtTime(i.slot.start)} ${esc(i.ev.title)}</button>`).join("")
          :'<div class="cal-empty" style="padding:10px 0">—</div>'}
      </div>`;
    }
    html+="</div>";
    grid.innerHTML=html;

  } else { // day
    const key=fmtKey(calState.date);
    title.textContent=`${DOW[calState.date.getDay()]} ${calState.date.getDate()} ${MON[calState.date.getMonth()]}`;
    const items=eventsOnDay(key).sort((a,b)=>a.sort-b.sort);
    grid.innerHTML = items.length
      ? `<div class="cal-day-list">${items.map(i=>`
          <button type="button" class="cal-day-row" data-id="${esc(i.ev.id)}">
            <span class="cal-day-time">${fmtTime(i.slot.start)}–${fmtTime(i.slot.end)}</span>
            <span class="cal-day-title">${esc(i.ev.title)}</span>
          </button>`).join("")}</div>`
      : '<div class="cal-empty">Nessun evento in programma questo giorno.</div>';
  }

  grid.querySelectorAll("[data-id]").forEach(b=>b.addEventListener("click",()=>{
    const ev=DATA.events.find(e=>e.id===b.dataset.id);
    if(ev){ closeCalendar(); openModal(ev); }
  }));
  grid.querySelectorAll(".cal-more").forEach(b=>b.addEventListener("click",()=>{
    calState.view="day";
    calState.date=new Date(b.dataset.key+"T00:00");
    document.querySelectorAll(".cal-view-btn").forEach(x=>x.setAttribute("aria-pressed",String(x.dataset.view==="day")));
    renderCalendar();
  }));
}

function openCalendar(){
  calState.view="month"; calState.date=new Date();
  document.querySelectorAll(".cal-view-btn").forEach(x=>x.setAttribute("aria-pressed",String(x.dataset.view==="month")));
  calOverlay.classList.add("show");
  renderCalendar();
}
function closeCalendar(){ calOverlay.classList.remove("show"); }

document.getElementById("calendar-toggle").addEventListener("click",openCalendar);
document.getElementById("calendar-close").addEventListener("click",closeCalendar);
calOverlay.addEventListener("click",e=>{ if(e.target===calOverlay) closeCalendar(); });
document.getElementById("cal-today").addEventListener("click",()=>{ calState.date=new Date(); renderCalendar(); });
document.querySelectorAll(".cal-view-btn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".cal-view-btn").forEach(x=>x.setAttribute("aria-pressed","false"));
  b.setAttribute("aria-pressed","true");
  calState.view=b.dataset.view;
  renderCalendar();
}));
document.getElementById("cal-prev").addEventListener("click",()=>{ calStep(-1); });
document.getElementById("cal-next").addEventListener("click",()=>{ calStep(1); });
function calStep(dir){
  const d=new Date(calState.date);
  if(calState.view==="month") d.setMonth(d.getMonth()+dir);
  else if(calState.view==="week") d.setDate(d.getDate()+7*dir);
  else d.setDate(d.getDate()+dir);
  calState.date=d;
  renderCalendar();
}

// ---- icone SVG animate del meteo (adattate da CastelSafe) ----
let weatherIconUid=0;
function weatherIconCategory(owmMain, owmId){
  if(owmMain==="Thunderstorm") return "temporale";
  if(owmMain==="Snow") return "neve";
  if(["Mist","Fog","Haze","Smoke","Dust","Sand"].includes(owmMain)) return "nebbia";
  if(["Rain","Drizzle"].includes(owmMain)) return "pioggia";
  if(owmMain==="Clear") return "sereno";
  if(owmMain==="Clouds"){
    if(owmId===801) return "poco-nuvoloso";
    return "nuvoloso";
  }
  return "poco-nuvoloso";
}
function weatherIconSvg(category, isNight){
  const uid=`w${(weatherIconUid++).toString(36)}`;
  const defs=`<defs>
    <radialGradient id="${uid}-sun" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#fde68a"/><stop offset="55%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></radialGradient>
    <radialGradient id="${uid}-moon" cx="38%" cy="32%" r="75%"><stop offset="0%" stop-color="#f1f5f9"/><stop offset="55%" stop-color="#cbd5e1"/><stop offset="100%" stop-color="#94a3b8"/></radialGradient>
    <linearGradient id="${uid}-cloud" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f1f5f9"/><stop offset="100%" stop-color="#cbd5e1"/></linearGradient>
    <linearGradient id="${uid}-cloud-dark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#64748b"/></linearGradient>
    <linearGradient id="${uid}-drop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <filter id="${uid}-glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`;
  const cloudShape=(fillRef,y=24)=>`<g class="w-cloud">
    <rect x="6" y="${y}" width="32" height="12" rx="6" fill="${fillRef}"/>
    <circle cx="14" cy="${y}" r="7" fill="${fillRef}"/><circle cx="33" cy="${y}" r="7" fill="${fillRef}"/>
    <circle class="w-cloud-top" cx="23" cy="${y-6}" r="10" fill="${fillRef}"/></g>`;
  const cloudWisp=(y=30)=>`<g class="w-cloud-wisp">
    <rect x="0" y="${y}" width="17" height="6.5" rx="3.2" fill="#cbd5e1"/><circle cx="4" cy="${y}" r="3.6" fill="#cbd5e1"/>
    <circle cx="9" cy="${y-3}" r="5" fill="#cbd5e1"/><circle cx="14.5" cy="${y}" r="3.6" fill="#cbd5e1"/></g>`;
  const spreadX=(n,xMin,xMax)=>{ const xs=[]; for(let i=0;i<n;i++) xs.push(n===1?(xMin+xMax)/2:xMin+((xMax-xMin)/(n-1))*i); return xs; };
  const rainDrops=(n,y0,y1,xMin=13,xMax=33)=>spreadX(n,xMin,xMax).map((x,i)=>
    `<g class="w-rain-drop" style="animation-delay:${(i*0.16).toFixed(2)}s"><line x1="${x.toFixed(1)}" y1="${y0}" x2="${(x-1.5).toFixed(1)}" y2="${y1}" stroke="url(#${uid}-drop)" stroke-width="2.6" stroke-linecap="round"/></g>`).join("");
  const snowFlakes=(n,xMin=13,xMax=33)=>spreadX(n,xMin,xMax).map((x,i)=>
    `<circle class="w-snow-flake" style="animation-delay:${(i*0.35).toFixed(2)}s" cx="${x.toFixed(1)}" cy="${37+(i%2?2:-2)}" r="2.3" fill="#bfdbfe"/>`).join("");
  const sunRays=(cx,cy,len,count,stroke)=>{ let out=""; for(let i=0;i<count;i++){ const a=(Math.PI*2*i)/count, r1=len, r2=len+6;
    out+=`<line x1="${(cx+Math.cos(a)*r1).toFixed(1)}" y1="${(cy+Math.sin(a)*r1).toFixed(1)}" x2="${(cx+Math.cos(a)*r2).toFixed(1)}" y2="${(cy+Math.sin(a)*r2).toFixed(1)}" stroke="${stroke}" stroke-width="2.4" stroke-linecap="round"/>`; } return out; };
  const moonAndStars=(cx,cy,r,stars)=>`<g class="w-moon-core"><path d="M${cx-r*0.35} ${cy-r} a${r} ${r} 0 1 0 0 ${r*2} a${r*0.78} ${r*0.78} 0 0 1 0 -${r*2}z" fill="url(#${uid}-moon)" filter="url(#${uid}-glow)"/></g>
    <g fill="#f8fafc">${stars.map((s,i)=>`<circle class="w-star" style="animation-delay:${(i*0.6).toFixed(2)}s" cx="${s[0]}" cy="${s[1]}" r="${s[2]}"/>`).join("")}</g>`;

  const svgs={
    "sereno": isNight
      ? `<svg viewBox="-6 -6 60 60" fill="none">${defs}${moonAndStars(23,22,11,[[38,10,1.4],[10,16,1],[40,30,1]])}</svg>`
      : `<svg viewBox="-6 -6 60 60" fill="none">${defs}<g class="w-sun-rays">${sunRays(24,24,12,8,"#f59e0b")}</g><circle class="w-sun-core" cx="24" cy="24" r="11" fill="url(#${uid}-sun)" filter="url(#${uid}-glow)"/></svg>`,
    "poco-nuvoloso": isNight
      ? `<svg viewBox="-6 -6 60 60" fill="none">${defs}${moonAndStars(17,16,7,[[36,8,1.2],[6,12,0.9]])}${cloudWisp(32)}<g transform="translate(6,13) scale(.72)">${cloudShape(`url(#${uid}-cloud)`,24)}</g></svg>`
      : `<svg viewBox="-6 -6 60 60" fill="none">${defs}<g class="w-sun-rays">${sunRays(18,17,8,6,"#f59e0b")}</g><circle class="w-sun-core" cx="18" cy="17" r="7.5" fill="url(#${uid}-sun)" filter="url(#${uid}-glow)"/>${cloudWisp(32)}<g transform="translate(6,13) scale(.72)">${cloudShape(`url(#${uid}-cloud)`,24)}</g></svg>`,
    "nuvoloso": `<svg viewBox="-6 -6 60 60" fill="none">${defs}${cloudWisp(30)}${cloudShape(`url(#${uid}-cloud)`,24)}</svg>`,
    "pioggia": `<svg viewBox="-6 -6 60 60" fill="none">${defs}${cloudShape(`url(#${uid}-cloud)`,20)}${rainDrops(4,34,43)}</svg>`,
    "temporale": `<svg viewBox="-6 -6 60 60" fill="none">${defs}${cloudShape(`url(#${uid}-cloud-dark)`,19)}${rainDrops(2,32,39,14,18)+rainDrops(2,32,39,28,32)}<polygon class="w-bolt" points="26,23 19,36 24,36 21,44 33,29 27,29 30,23" fill="#fbbf24" filter="url(#${uid}-glow)"/></svg>`,
    "neve": `<svg viewBox="-6 -6 60 60" fill="none">${defs}${cloudShape(`url(#${uid}-cloud)`,20)}${snowFlakes(4,13,33)}</svg>`,
    "nebbia": `<svg viewBox="-6 -6 60 60" fill="none">${defs}<circle cx="20" cy="14" r="8" fill="url(#${uid}-cloud)" opacity=".8"/><g stroke="#94a3b8" stroke-width="2.6" stroke-linecap="round"><line class="w-fog-line" x1="6" y1="25" x2="42" y2="25"/><line class="w-fog-line" x1="10" y1="32" x2="38" y2="32"/><line class="w-fog-line" x1="6" y1="39" x2="42" y2="39"/></g></svg>`
  };
  return svgs[category] || svgs["poco-nuvoloso"];
}

// ---- barra meteo: file statico weather.json, generato lato Pi (chiave OWM mai nel client) ----
async function loadWeather(){
  const bar=document.getElementById("weather-bar");
  try{
    const r=await fetch(PI_BASE+"/weather.json",{cache:"no-store"});
    if(!r.ok) return;
    const data=await r.json();
    const w=data.weather[0];
    const nowUnix=data.dt, sunrise=data.sys?.sunrise, sunset=data.sys?.sunset;
    const isNight=(sunrise&&sunset)?(nowUnix<sunrise||nowUnix>sunset):(new Date().getHours()<6||new Date().getHours()>=21);
    const cat=weatherIconCategory(w.main, w.id);
    const windKmh=Math.round((data.wind?.speed||0)*3.6);
    bar.innerHTML=`
      <div class="weather-icon-mini">${weatherIconSvg(cat, isNight)}</div>
      <div class="weather-main">
        <div class="weather-temp-row">
          <span class="w-temp">${Math.round(data.main.temp)}°C</span>
          <span class="w-desc">${esc(w.description)}</span>
        </div>
        <div class="weather-detail-row">
          <span>percepita ${Math.round(data.main.feels_like)}°C</span>
          <span>min ${Math.round(data.main.temp_min)}° · max ${Math.round(data.main.temp_max)}°</span>
          <span>umidità ${data.main.humidity}%</span>
          <span>vento ${windKmh} km/h</span>
        </div>
      </div>`;
    bar.classList.add("show");
  }catch(_){ /* meteo non essenziale: silenzioso se offline/quota esaurita */ }
}
